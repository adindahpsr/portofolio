<svg width="800" height="450" viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="450" fill="#0f172a"/>
  <rect x="0" y="0" width="800" height="450" fill="url(#grid)" opacity="0.05"/>
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#94a3b8" stroke-width="0.5"/>
    </pattern>
  </defs>
  <!-- Chart bars -->
  <rect x="120" y="260" width="40" height="120" rx="4" fill="#3b82f6" opacity="0.8"/>
  <rect x="180" y="200" width="40" height="180" rx="4" fill="#3b82f6" opacity="0.9"/>
  <rect x="240" y="160" width="40" height="220" rx="4" fill="#3b82f6"/>
  <rect x="300" y="220" width="40" height="160" rx="4" fill="#3b82f6" opacity="0.7"/>
  <rect x="360" y="140" width="40" height="240" rx="4" fill="#60a5fa"/>
  <rect x="420" y="180" width="40" height="200" rx="4" fill="#3b82f6" opacity="0.8"/>
  <rect x="480" y="240" width="40" height="140" rx="4" fill="#3b82f6" opacity="0.6"/>
  <!-- Line chart -->
  <polyline points="120,240 180,190 240,155 300,210 360,135 420,170 480,230 540,200" fill="none" stroke="#f59e0b" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="120" cy="240" r="4" fill="#f59e0b"/>
  <circle cx="180" cy="190" r="4" fill="#f59e0b"/>
  <circle cx="240" cy="155" r="4" fill="#f59e0b"/>
  <circle cx="300" cy="210" r="4" fill="#f59e0b"/>
  <circle cx="360" cy="135" r="4" fill="#f59e0b"/>
  <circle cx="420" cy="170" r="4" fill="#f59e0b"/>
  <circle cx="480" cy="230" r="4" fill="#f59e0b"/>
  <circle cx="540" cy="200" r="4" fill="#f59e0b"/>
  <!-- Labels -->
  <text x="400" y="60" font-family="monospace" font-size="18" fill="#f1f5f9" text-anchor="middle" font-weight="bold">Thesis — Analisis Data</text>
  <text x="400" y="86" font-family="monospace" font-size="12" fill="#64748b" text-anchor="middle">Machine Learning · Klasifikasi · Sentimen</text>
  <!-- Accuracy badge -->
  <rect x="580" y="150" width="160" height="80" rx="8" fill="#1e293b" stroke="#3b82f6" stroke-width="1"/>
  <text x="660" y="183" font-family="monospace" font-size="11" fill="#64748b" text-anchor="middle">Accuracy</text>
  <text x="660" y="215" font-family="monospace" font-size="28" fill="#60a5fa" text-anchor="middle" font-weight="bold">94.2%</text>
</svg>
