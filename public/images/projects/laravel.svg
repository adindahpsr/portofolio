<svg width="800" height="450" viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="450" fill="#1e1b4b"/>
  <defs>
    <pattern id="dots" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#6366f1" opacity="0.2"/>
    </pattern>
  </defs>
  <rect width="800" height="450" fill="url(#dots)"/>
  <!-- Browser chrome -->
  <rect x="80" y="80" width="640" height="310" rx="10" fill="#0f0e17" stroke="#374151" stroke-width="1.5"/>
  <rect x="80" y="80" width="640" height="36" rx="10" fill="#1f1f2e"/>
  <rect x="80" y="104" width="640" height="12" fill="#1f1f2e"/>
  <!-- Browser dots -->
  <circle cx="106" cy="98" r="5" fill="#ef4444" opacity="0.8"/>
  <circle cx="124" cy="98" r="5" fill="#f59e0b" opacity="0.8"/>
  <circle cx="142" cy="98" r="5" fill="#22c55e" opacity="0.8"/>
  <!-- URL bar -->
  <rect x="170" y="90" width="380" height="16" rx="3" fill="#374151"/>
  <text x="360" y="102" font-family="monospace" font-size="9" fill="#9ca3af" text-anchor="middle">localhost:8000/dashboard</text>
  <!-- Sidebar -->
  <rect x="80" y="116" width="160" height="274" fill="#111827"/>
  <!-- Nav items -->
  <rect x="95" y="135" width="130" height="28" rx="4" fill="#4f46e5"/>
  <text x="160" y="153" font-family="monospace" font-size="10" fill="white" text-anchor="middle">Dashboard</text>
  <text x="160" y="185" font-family="monospace" font-size="10" fill="#6b7280" text-anchor="middle">Users</text>
  <text x="160" y="210" font-family="monospace" font-size="10" fill="#6b7280" text-anchor="middle">Data</text>
  <text x="160" y="235" font-family="monospace" font-size="10" fill="#6b7280" text-anchor="middle">Reports</text>
  <text x="160" y="260" font-family="monospace" font-size="10" fill="#6b7280" text-anchor="middle">Settings</text>
  <!-- Main content -->
  <!-- Stats cards -->
  <rect x="255" y="130" width="120" height="60" rx="6" fill="#1f2937"/>
  <text x="315" y="153" font-family="monospace" font-size="9" fill="#9ca3af" text-anchor="middle">Total Users</text>
  <text x="315" y="177" font-family="monospace" font-size="18" fill="#818cf8" text-anchor="middle" font-weight="bold">1,248</text>
  <rect x="390" y="130" width="120" height="60" rx="6" fill="#1f2937"/>
  <text x="450" y="153" font-family="monospace" font-size="9" fill="#9ca3af" text-anchor="middle">Revenue</text>
  <text x="450" y="177" font-family="monospace" font-size="18" fill="#34d399" text-anchor="middle" font-weight="bold">Rp 4.2M</text>
  <rect x="525" y="130" width="120" height="60" rx="6" fill="#1f2937"/>
  <text x="585" y="153" font-family="monospace" font-size="9" fill="#9ca3af" text-anchor="middle">Orders</text>
  <text x="585" y="177" font-family="monospace" font-size="18" fill="#f59e0b" text-anchor="middle" font-weight="bold">342</text>
  <!-- Table -->
  <rect x="255" y="205" width="460" height="170" rx="6" fill="#1f2937"/>
  <rect x="255" y="205" width="460" height="30" rx="6" fill="#374151"/>
  <text x="280" y="225" font-family="monospace" font-size="9" fill="#d1d5db">Name</text>
  <text x="420" y="225" font-family="monospace" font-size="9" fill="#d1d5db">Email</text>
  <text x="580" y="225" font-family="monospace" font-size="9" fill="#d1d5db">Status</text>
  <line x1="255" y1="235" x2="715" y2="235" stroke="#374151" stroke-width="1"/>
  <text x="280" y="255" font-family="monospace" font-size="8" fill="#9ca3af">User A</text>
  <text x="420" y="255" font-family="monospace" font-size="8" fill="#9ca3af">user.a@mail.com</text>
  <rect x="580" y="243" width="40" height="14" rx="7" fill="#065f46"/>
  <text x="600" y="253" font-family="monospace" font-size="7" fill="#34d399" text-anchor="middle">Active</text>
  <line x1="255" y1="265" x2="715" y2="265" stroke="#374151" stroke-width="0.5" stroke-dasharray="4"/>
  <text x="280" y="285" font-family="monospace" font-size="8" fill="#9ca3af">User B</text>
  <text x="420" y="285" font-family="monospace" font-size="8" fill="#9ca3af">user.b@mail.com</text>
  <rect x="580" y="273" width="40" height="14" rx="7" fill="#7f1d1d"/>
  <text x="600" y="283" font-family="monospace" font-size="7" fill="#fca5a5" text-anchor="middle">Inactive</text>
</svg>
